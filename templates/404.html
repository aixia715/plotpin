<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>未找到 - PlotPin</title>
  <script>
    // 防闪烁：在样式加载前先定 data-theme。localStorage 优先，其次系统偏好。
    (function () {
      try {
        var t = localStorage.getItem("plotpin-theme");
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.dataset.theme = t;
      } catch (_) {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">Plot<span class="pin">Pin</span></div>
    <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换夜间模式">
      <span class="theme-toggle-icon">☾</span>
      <span class="theme-toggle-label">夜间</span>
    </button>
  </header>
  <div style="padding:60px 0; text-align:center;">
    <div style="font-family:var(--mono); font-size:64px; font-weight:600; color:var(--line); margin-bottom:16px;">404</div>
    <p style="color:var(--muted); margin-bottom:24px;">找不到该图表。</p>
    <a href="/" style="font-family:var(--mono); font-size:13px; color:var(--accent-ink);">← 返回首页</a>
  </div>
</div>
<script src="/static/theme.js"></script>
</body>
</html>
