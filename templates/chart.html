<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ chart.title }} - PlotPin</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/plotly.min.js"></script>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="back" href="/">← 返回记录</a>
    <div class="brand">Plot<span class="pin">Pin</span></div>
  </div>

  <div class="titlewrap">
    <h1>{{ chart.title }}</h1>
    <div class="sub">ID <span class="id">{{ chart.id }}</span> · 创建于 {{ chart.created_at }}</div>
  </div>

  <div class="panel">
    <div id="plot" style="width:100%;height:420px;"></div>
  </div>

  <div class="readout">
    <div class="lbl">永久链接</div>
    <div class="link">
      <span class="tag">交互页</span>
      <code class="url" id="link-page"></code>
      <button class="copy" data-target="link-page">复制</button>
    </div>
    <div class="link">
      <span class="tag">PNG</span>
      <code class="url" id="link-png"></code>
      <button class="copy" data-target="link-png">复制</button>
    </div>
    <div class="link">
      <span class="tag">SVG</span>
      <code class="url" id="link-svg"></code>
      <button class="copy" data-target="link-svg">复制</button>
    </div>
    <div class="note">PNG / SVG 可用 ![](链接) 直接嵌入笔记 · ID 永久不变</div>
  </div>
</div>

<script id="spec" type="application/json">{{ spec_json | safe }}</script>
<script>
  const spec = JSON.parse(document.getElementById("spec").textContent);
  Plotly.newPlot("plot", spec.data, spec.layout, {responsive: true});
  const base = location.origin + "/chart/{{ chart.id }}";
  document.getElementById("link-page").textContent = base;
  document.getElementById("link-png").textContent = base + ".png";
  document.getElementById("link-svg").textContent = base + ".svg";

  // HTTP(非安全上下文)下 navigator.clipboard 不可用,用 execCommand 兜底
  function copyText(text) {
    if (navigator.clipboard && window.isSecureContext) {
      return navigator.clipboard.writeText(text);
    }
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand("copy"); } finally { ta.remove(); }
    return Promise.resolve();
  }

  document.querySelectorAll(".copy").forEach((btn) => {
    btn.addEventListener("click", () => {
      const code = document.getElementById(btn.dataset.target);
      copyText(code.textContent).then(() => {
        const old = btn.textContent;
        btn.textContent = "已复制";
        setTimeout(() => { btn.textContent = old; }, 1500);
      });
    });
    // 兜底再兜底:点链接文本即整段选中,用户可手动复制
    const code = document.getElementById(btn.dataset.target);
    code.addEventListener("click", () => {
      const r = document.createRange();
      r.selectNodeContents(code);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(r);
    });
  });
</script>
</body>
</html>
