<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ chart.title }} - PlotPin</title>
  <script>
    // 防闪烁：在样式加载前先定 data-theme。localStorage 优先，其次系统偏好。
    (function () {
      try {
        var t = localStorage.getItem("plotpin-theme");
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.dataset.theme = t;
      } catch (_) {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/plotly.min.js"></script>
</head>
<body>
<div class="wrap">
  {% if log_warning %}
  <div id="log-toast" class="toast" role="status">{{ log_warning }}</div>
  {% endif %}
  <div class="topbar">
    <a class="back" href="/">← 返回记录</a>
    <div class="topbar-right">
      <div class="brand">Plot<span class="pin">Pin</span></div>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换夜间模式">
        <span class="theme-toggle-icon">☾</span>
        <span class="theme-toggle-label">夜间</span>
      </button>
    </div>
  </div>

  <div class="titlewrap">
    <h1>{{ chart.title }}</h1>
    <div class="sub">ID <span class="id">{{ chart.id }}</span> · 创建于 <time class="local-time" datetime="{{ chart.created_at }}">{{ chart.created_at }}</time></div>
  </div>

  <div class="panel">
    <div id="plot" style="width:100%;"></div>
  </div>

  <div class="readout">
    <div class="lbl">永久链接</div>
    <div class="link">
      <span class="tag">交互页</span>
      <code class="url" id="link-page"></code>
      <button class="copy" data-target="link-page">复制</button>
    </div>
    <div class="link">
      <span class="tag">PNG</span>
      <code class="url" id="link-png"></code>
      <button class="copy" data-target="link-png">复制</button>
    </div>
    <div class="link">
      <span class="tag">SVG</span>
      <code class="url" id="link-svg"></code>
      <button class="copy" data-target="link-svg">复制</button>
    </div>
    <div class="note">PNG / SVG 可用 ![](链接) 直接嵌入笔记 · ID 永久不变</div>
    <a class="link download" href="/chart/{{ chart.id }}.csv" download="{{ chart.id }}.csv">
      <span class="tag">CSV</span>
      <span class="dl-label">下载原始数据 · {{ chart.id }}.csv</span>
      <span class="dl-btn">下载 ↓</span>
    </a>
  </div>
</div>

<script id="spec" type="application/json">{{ spec | tojson }}</script>
<script>
  const spec = JSON.parse(document.getElementById("spec").textContent);
  const panelN = Object.keys(spec.layout).filter((k) => /^yaxis\d*$/.test(k)).length || 1;
  document.getElementById("plot").style.height = Math.max(360, panelN * 300) + "px";
  Plotly.newPlot("plot", spec.data, spec.layout, {responsive: true});
  // 夜间模式联动：DOMContentLoaded 后 theme.js 已就绪，按当前主题着色；切换时 relayout。
  function applyPlotTheme() {
    const theme = document.documentElement.dataset.theme === "dark" ? "dark" : "light";
    Plotly.relayout("plot", plotlyThemePatch(theme, panelN));
  }
  document.addEventListener("DOMContentLoaded", applyPlotTheme);
  document.addEventListener("plotpin:theme-change", applyPlotTheme);
  const base = location.origin + "/chart/{{ chart.id }}";
  document.getElementById("link-page").textContent = base;
  document.getElementById("link-png").textContent = base + ".png";
  document.getElementById("link-svg").textContent = base + ".svg";

  // HTTP(非安全上下文)下 navigator.clipboard 不可用,用 execCommand 兜底
  function copyText(text) {
    if (navigator.clipboard && window.isSecureContext) {
      return navigator.clipboard.writeText(text);
    }
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand("copy"); } finally { ta.remove(); }
    return Promise.resolve();
  }

  document.querySelectorAll(".copy").forEach((btn) => {
    btn.addEventListener("click", () => {
      const code = document.getElementById(btn.dataset.target);
      copyText(code.textContent).then(() => {
        const old = btn.textContent;
        btn.textContent = "已复制";
        setTimeout(() => { btn.textContent = old; }, 1500);
      });
    });
    // 兜底再兜底:点链接文本即整段选中,用户可手动复制
    const code = document.getElementById(btn.dataset.target);
    code.addEventListener("click", () => {
      const r = document.createRange();
      r.selectNodeContents(code);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(r);
    });
  });
</script>
{% if log_warning %}
<script>
  // 对数轴 ≤0 警告：显示约 3 秒后淡出移除
  const logToast = document.getElementById("log-toast");
  if (logToast) {
    requestAnimationFrame(() => logToast.classList.add("show"));
    setTimeout(() => {
      logToast.classList.remove("show");
      setTimeout(() => logToast.remove(), 300);
    }, 3000);
  }
</script>
{% endif %}
<script src="/static/localtime.js"></script>
<script src="/static/theme.js"></script>
</body>
</html>
