name: opencode-scheduled

on:
  schedule:
    - cron: "0 18 * * *"   # 北京时间 02:00（UTC+8）
  workflow_dispatch:
    inputs:
      dry_run:
        description: "试运行：只预览会如何处理各 issue（不评论、不开 PR、不做任何修改）"
        type: boolean
        default: false

# 避免与上一次未结束的运行重叠
concurrency:
  group: opencode-scheduled
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL }}
      # CI 专用权限配置（放开非交互工具），不影响仓库根目录给本地使用的配置
      OPENCODE_CONFIG: ${{ github.workspace }}/.github/opencode-ci.json
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      # 仅定时（cron, event_name=schedule）运行时排除带「AI忽略」标签的 issue；
      # 手动运行（workflow_dispatch）则照常处理被标记的 issue。
      APPLY_IGNORE: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # 需要完整历史以建分支/开 PR

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"  # 对齐生产镜像与 _checks.yml
      - run: pip install -r requirements-dev.txt

      - name: 安装 opencode CLI
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      - name: 确保标签存在
        run: |
          gh label create "等待回复" --color FBCA04 \
            --description "opencode 已就该 issue 提问，等待人类答复" 2>/dev/null || true
          gh label create "已自动修复" --color 0E8A16 \
            --description "opencode 已为该 issue 开出修复 PR" 2>/dev/null || true
          gh label create "AI忽略" --color D4C5F9 \
            --description "人工标记：仅定时自动 triage 跳过该 issue；手动运行工作流或 /oc 触发不受影响" 2>/dev/null || true

      - name: 运行每日 triage
        run: bash scripts/opencode-triage.sh
